<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="calculator">
      <div class="display">
        <div class="display-expression" id="expression"></div>
        <div class="display-value" id="display">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-operator" data-action="toggle-sign">+/-</button>
        <button class="btn btn-operator" data-action="percent">%</button>
        <button class="btn btn-operator btn-accent" data-action="operator" data-value="/">&divide;</button>

        <button class="btn" data-action="number" data-value="7">7</button>
        <button class="btn" data-action="number" data-value="8">8</button>
        <button class="btn" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator btn-accent" data-action="operator" data-value="*">&times;</button>

        <button class="btn" data-action="number" data-value="4">4</button>
        <button class="btn" data-action="number" data-value="5">5</button>
        <button class="btn" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator btn-accent" data-action="operator" data-value="-">&minus;</button>

        <button class="btn" data-action="number" data-value="1">1</button>
        <button class="btn" data-action="number" data-value="2">2</button>
        <button class="btn" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator btn-accent" data-action="operator" data-value="+">+</button>

        <button class="btn btn-wide" data-action="number" data-value="0">0</button>
        <button class="btn" data-action="decimal">.</button>
        <button class="btn btn-accent" data-action="equals">=</button>
      </div>
    </div>
    <div class="history-panel">
      <div class="history-header">
        <h2>History</h2>
        <button class="history-clear" id="clear-history">Clear</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">No calculations yet</div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
